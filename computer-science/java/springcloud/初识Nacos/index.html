  <script>
  /* search */
  (function() {
    var input = document.getElementById('search-input');
    var results = document.getElementById('search-results');
    var posts = null;
    var idx = {};

    input.addEventListener('focus', function() {
      if (!posts) loadData();
    });

    input.addEventListener('input', function() {
      var q = this.value.trim();
      if (q.length < 2) { results.innerHTML = ''; results.classList.remove('show'); return; }
      if (!posts) { loadData(function() { doSearch(q); }); return; }
      doSearch(q);
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-box')) results.classList.remove('show');
    });

    function loadData(cb) {
      fetch('/search.json')
        .then(function(r) { return r.json(); })
        .then(function(json) {
          posts = json;
          json.forEach(function(item, i) { idx['p' + i] = { text: (item.title + ' ' + strip(item.content || '')).toLowerCase(), item: item }; });
          (window.__downloads || []).forEach(function(item, i) {
            idx['d' + i] = { text: item.title.toLowerCase(), item: item };
          });
          if (cb) cb();
        });
    }

    function strip(html) {
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function doSearch(q) {
      q = q.toLowerCase();
      var hits = [];
      Object.keys(idx).forEach(function(k) {
        var score = 0;
        var pos = idx[k].text.indexOf(q);
        if (pos !== -1) {
          score = pos === 0 ? 100 : 100 - pos;
          hits.push({ idx: k, score: score });
        }
      });
      hits.sort(function(a, b) { return b.score - a.score; });
      hits = hits.slice(0, 8);

      if (hits.length === 0) {
        results.innerHTML = '<div class="search-empty">没有找到结果</div>';
      } else {
        results.innerHTML = hits.map(function(h) {
          var entry = idx[h.idx];
          var item = entry.item;
          var isDownload = h.idx.charAt(0) === 'd';
          var sub = isDownload ? '<span class="search-tag">资源下载</span>' : '<span class="search-excerpt">' + excerpt(item.content, q, 80) + '</span>';
          return '<a class="search-item" href="' + item.url + '">' +
            '<span class="search-title">' + highlight(item.title, q) + '</span>' + sub +
          '</a>';
        }).join('');
      }
      results.classList.add('show');
    }

    function highlight(text, q) {
      var re = new RegExp('(' + escapeRegExp(q) + ')', 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }

    function excerpt(html, q, len) {
      var text = strip(html);
      var pos = text.toLowerCase().indexOf(q.toLowerCase());
      if (pos === -1) pos = 0;
      var start = Math.max(0, pos - 30);
      var snippet = text.substring(start, start + len);
      if (start > 0) snippet = '...' + snippet;
      if (start + len < text.length) snippet += '...';
      return highlight(snippet, q);
    }

    function escapeRegExp(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
  })();
  </script>

  <!-- Mermaid 流程图 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
  (function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    mermaid.initialize({
      startOnLoad: false,
      theme: isDark ? 'dark' : 'default',
      securityLevel: 'loose'
    });

    async function renderMermaid() {
      var blocks = document.querySelectorAll('.post-content pre code.language-mermaid');
      for (var i = 0; i < blocks.length; i++) {
        var code = blocks[i];
        var pre = code.parentElement;
        if (pre.dataset.mermaidRendered) continue;
        pre.dataset.mermaidRendered = '1';

        var origCode = code.textContent;
        var container = document.createElement('div');
        container.className = 'mermaid-container';
        container.setAttribute('data-orig', origCode);
        container.textContent = origCode;
        pre.parentNode.replaceChild(container, pre);

        try {
          await mermaid.run({ nodes: [container] });
        } catch(e) {
          container.innerHTML = '<pre class="mermaid-error">Mermaid 图表语法错误: ' + e.message + '</pre>';
          container.removeAttribute('data-orig');
        }
      }
    }

    renderMermaid();

    /* 主题切换时重新渲染 mermaid */
    var darkToggle = document.getElementById('dark-toggle');
    if (darkToggle) {
      var origClick = darkToggle.onclick;
      darkToggle.addEventListener('click', function() {
        setTimeout(async function() {
          var containers = document.querySelectorAll('.mermaid-container[data-orig]');
          for (var i = 0; i < containers.length; i++) {
            var el = containers[i];
            el.removeAttribute('data-processed');
            el.innerHTML = '';
            el.textContent = el.getAttribute('data-orig');
          }
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          mermaid.initialize({
            startOnLoad: false,
            theme: isDark ? 'dark' : 'default',
            securityLevel: 'loose'
          });
          if (containers.length > 0) {
            try { await mermaid.run({ nodes: Array.from(containers) }); } catch(e) {}
          }
        }, 150);
      });
    }
  })();
  </script>
